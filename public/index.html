<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>升级找朋友</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main id="app">

      <!-- 加入界面 -->
      <section class="join-screen" data-view="join">
        <div class="join-bg"></div>
        <div class="join-content">
          <div class="brand">
            <div class="brand-suits">♠ ♥ ♣ ♦</div>
            <h1>升级找朋友</h1>
            <p>多人联机 · 三副牌</p>
          </div>
          <form id="joinForm" class="join-panel">
            <div class="join-field">
              <span>头像</span>
              <div id="avatarPicker" class="avatar-picker"></div>
            </div>
            <label>
              <span>昵称</span>
              <input id="nickname" maxlength="16" autocomplete="nickname" required placeholder="输入昵称">
            </label>
            <label>
              <span>房间码</span>
              <input id="roomCode" maxlength="8" placeholder="留空则创建新房间">
            </label>
            <label>
              <span>人数（仅创建房间用）</span>
              <select id="seatCountSel">
                <option value="5">5 人 · 找朋友</option>
                <option value="6">6 人 · 隔座固定队</option>
              </select>
            </label>
            <div class="join-actions">
              <button type="submit" class="btn-primary">进入房间</button>
              <button type="button" id="createRoom" class="btn-secondary">创建房间</button>
            </div>
          </form>
        </div>
      </section>

      <!-- 游戏界面：整个都是牌桌 -->
      <section class="game-screen hidden" data-view="game">

        <!-- 顶部信息条 -->
        <div class="topbar">
          <div class="topbar-left">
            <div class="topbar-title-row">
              <span class="game-title">升级找朋友</span>
              <button id="copyInviteBtn" class="topbar-btn" title="复制邀请链接发给朋友">🔗</button>
            </div>
            <span id="roomBadge" class="badge" title="点击复制邀请链接"></span>
          </div>
          <div id="phaseBadge" class="phase-badge"></div>
          <div class="topbar-right">
            <span id="roundInfo" class="round-info"></span>
            <button id="exitRoomBtn" class="topbar-btn" title="退出房间">退出</button>
            <button id="fullscreenBtn" class="topbar-btn" title="全屏">⛶</button>
          </div>
        </div>

        <!-- 整个牌桌区域（绝对定位的所有元素） -->
        <div class="table-felt">

          <div id="pingStatus" class="ping-status">连接中…</div>

          <!-- 观战者列表（左上角） -->
          <div id="spectatorList" class="spectator-list"></div>

          <!-- 座位（5个，绝对定位） -->
          <div id="seats" class="seats"></div>

          <!-- 桌面中央信息 -->
          <div class="table-center">
            <div id="scoreInfo" class="score-info"></div>
            <div id="turnInfo" class="turn-info"></div>
            <div id="friendBanner" class="friend-banner"></div>
            <div id="bidReveal" class="bid-reveal"></div>
            <div id="centerAction" class="center-action"></div>
          </div>
          <div id="trusteeControls" class="trustee-controls"></div>

          <!-- 底部控制区（在桌布内） -->
          <div class="control-zone">
            <div id="errorBox" class="error-box"></div>
            <div id="contextControls" class="context-controls"></div>
            <div class="hand-zone">
              <div class="hand-meta">
                <span id="selectionInfo" class="selection-info"></span>
              </div>
              <div id="hand" class="hand"></div>
            </div>
          </div>

        </div>

        <!-- 收起式日志 -->
        <div id="logDrawer" class="log-drawer">
          <button class="log-toggle" id="standingsToggle">🏆 战绩</button>
          <button class="log-toggle" id="logToggle">📜 记录</button>
          <div class="log-panel" id="standingsPanel">
            <div id="standings" class="standings-list"></div>
          </div>
          <div class="log-panel" id="logPanel">
            <div id="log" class="history-list"></div>
          </div>
        </div>

      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
