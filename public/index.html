<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>升级找朋友</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main id="app">
      <section class="join-screen" data-view="join">
        <div class="brand">
          <p>5 人联机</p>
          <h1>升级找朋友</h1>
        </div>
        <form id="joinForm" class="join-panel">
          <label>
            昵称
            <input id="nickname" maxlength="16" autocomplete="nickname" required placeholder="输入昵称">
          </label>
          <label>
            房间码
            <input id="roomCode" maxlength="8" placeholder="留空创建新房间">
          </label>
          <div class="actions">
            <button type="submit">进入房间</button>
            <button type="button" id="createRoom">创建房间</button>
          </div>
        </form>
      </section>

      <section class="game-screen hidden" data-view="game">
        <header class="topbar">
          <div>
            <strong>升级找朋友</strong>
            <span id="roomBadge"></span>
          </div>
          <div id="phaseBadge"></div>
        </header>

        <section class="table-area">
          <div id="seats" class="seats"></div>
          <div class="center-table">
            <div id="roundInfo" class="round-info"></div>
            <div id="trick" class="trick"></div>
            <div class="scoreline">
              <span id="scoreInfo"></span>
              <span id="turnInfo"></span>
            </div>
          </div>
        </section>

        <section class="control-strip">
          <div id="contextControls"></div>
          <div id="errorBox" class="error"></div>
        </section>

        <section class="hand-panel">
          <div class="hand-head">
            <h2>我的手牌</h2>
            <div id="selectionInfo"></div>
          </div>
          <div id="hand" class="hand"></div>
        </section>

        <aside class="log-panel">
          <h2>牌桌记录</h2>
          <div id="log"></div>
        </aside>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
